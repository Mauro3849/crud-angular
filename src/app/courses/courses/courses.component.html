<mat-card>
  <mat-toolbar color="primary">Cursos Disponiveis</mat-toolbar>
  <div *ngIf="courses$|async as courses;else loading">
    <mat-table [dataSource]="courses
    " class="mat-elevation-z8">
  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <mat-header-cell *matHeaderCellDef> Nome </mat-header-cell>
    <mat-cell *matCellDef="let course"> {{course.name}} </mat-cell>
  </ng-container>

  <!-- egorCaty Column -->
  <ng-container matColumnDef="category">
    <mat-header-cell *matHeaderCellDef> Categoria </mat-header-cell>
    <mat-cell *matCellDef="let course"> {{course.category}}
      <mat-icon>{{course.category|category}}</mat-icon>
    </mat-cell>

  </ng-container>

  <!-- Actions Column -->
  <ng-container matColumnDef="actions">
    <mat-header-cell *matHeaderCellDef class="action-colum">
      <button mat-icon-button color="blue" aria-label="Adicionar um curso">
         <mat-icon (click)="onAdd()">add</mat-icon>
      </button>
    </mat-header-cell>

    <mat-cell *matCellDef="let course">
      <button mat-icon-button color="primary" aria-label="Editar um curso">
        <mat-icon>edit</mat-icon>
     </button>

     <button mat-icon-button color="warn" aria-label="Remover um curso">
      <mat-icon>delete</mat-icon>
   </button>

    </mat-cell>

  </ng-container>

  <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
  <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
</mat-table>
</div>
<ng-template #loading>
  <div class="loading-spinner">
  <mat-spinner></mat-spinner>
</div>
</ng-template>

</mat-card>
